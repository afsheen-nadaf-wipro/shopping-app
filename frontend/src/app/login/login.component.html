<div class="login-container">
  <form (ngSubmit)="onLogin()">
    <h2>Login</h2>

    <label>Email</label>
    <input
      type="email"
      [(ngModel)]="email"
      name="email"
      required
      placeholder="Enter email"
    />

    <label>Password</label>
    <input
      type="password"
      [(ngModel)]="password"
      name="password"
      required
      placeholder="Enter password"
    />

    <button type="submit">Login</button>

    <p *ngIf="message" class="message">{{ message }}</p>
  </form>
</div>
