<nav class="navbar">
  <div *ngIf="isLoginPage" class="center-logo">
    <span>Boutique Cart</span>
  </div>

  <ng-container *ngIf="!isLoginPage">
    <div class="logo">
      <span class="logo-mark">BC</span>
      <div>
        <strong>Boutique Cart</strong>
        <small>Curated daily essentials</small>
      </div>
    </div>

    <ul class="nav-links">
      <li>
        <a routerLink="/items" routerLinkActive="active">Items</a>
      </li>
      <li>
        <a routerLink="/cart" routerLinkActive="active">
          Cart
          <span class="badge" *ngIf="cartService.getCount() > 0">
            {{ cartService.getCount() }}
          </span>
        </a>
      </li>
      <li>
        <a routerLink="/orders" routerLinkActive="active">My Orders</a>
      </li>
      <li>
        <span class="user-name" *ngIf="currentUser">Hi, {{ currentUser.name }}</span>
      </li>
      <li>
        <button class="logout-btn" (click)="logout()">Log Out</button>
      </li>
    </ul>
  </ng-container>
</nav>
