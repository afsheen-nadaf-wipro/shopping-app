<nav class="navbar">

  <!-- ✅ LOGIN STATE (centered logo only) -->
  <div *ngIf="isLoginPage" class="center-logo">
    Shopping App
  </div>

  <!-- ✅ AFTER LOGIN (full navbar exactly like yours) -->
  <ng-container *ngIf="!isLoginPage">

    <div class="logo">Shopping App</div>

    <ul class="nav-links">
      <li>
        <a routerLink="/items" routerLinkActive="active">Items</a>
      </li>

      <li>
        <a routerLink="/cart" routerLinkActive="active">
          Cart
          <!-- ✅ FIX: use *ngIf (you missed the *) -->
          <span class="badge" *ngIf="cartService.getCount() > 0">
            {{ cartService.getCount() }}
          </span>
        </a>
      </li>
      <li>
        <a routerLink = "/">Log Out</a>
      </li>
    </ul>

  </ng-container>

</nav>
